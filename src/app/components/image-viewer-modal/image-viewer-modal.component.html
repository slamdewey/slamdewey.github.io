@if (isModalOpen()) {
  <div
    tabindex="-1"
    class="image-modal"
    (wheel)="onModalWheel($event)"
    (mousedown)="onModalMouseDown($event)"
    (mouseup)="onModalMouseUp($event)"
    (mousemove)="onModalMouseMove($event)">
    @if (shouldDisplaySpinner()) {
      <x-spinner class="image-modal__spinner" />
    }
    <div class="image-modal__controls">
      <button class="image-modal__controls__button" (click)="zoomOut()">-</button>
      <button class="image-modal__controls__button" (click)="zoomIn()">+</button>
      <button class="image-modal__controls__button" (click)="closeModal()">&times;</button>
    </div>
    <img
      alt="Full size image"
      class="image-modal__content"
      loading="lazy"
      [style.transform]="zoomOptionsViewTransform()"
      (load)="checkIfImageLoadingComplete($event)"
      [attr.src]="imageSource()" />
  </div>
}
