<x-backdrop [backdrop]="bgAnimation()" [fullscreen]="true"></x-backdrop>
<div class="projects">
  <x-banner>
    <ng-container ngProjectAs="title">Projects</ng-container>
  </x-banner>

  <div class="projects__gallery">
    @for (projectData of projects; track projectData.routerLink) {
      <a [title]="projectData.labelText" class="projects__gallery__item" [routerLink]="projectData.routerLink">
        <x-backdrop [backdrop]="projectData.backdrop" [shouldPauseAnimation]="!projectData.hovered()"></x-backdrop>
        <div
          class="projects__gallery__item__hover"
          (mouseenter)="projectData.hovered.set(true); projectData.onMouseEnter?.()"
          (mouseleave)="projectData.hovered.set(false); projectData.onMouseExit?.()">
          <div class="projects__gallery__item__hover-content">
            {{ projectData.labelText }}
          </div>
        </div>
      </a>
    }
  </div>
</div>
