<div class="param-controls">
  <mat-accordion>
    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header>
        <mat-panel-title>Noise Parameters</mat-panel-title>
      </mat-expansion-panel-header>

      <div class="param-controls__row">
        <mat-form-field appearance="outline" class="param-controls__field">
          <mat-label>Seed</mat-label>
          <input matInput type="number" [ngModel]="noise().seed" (ngModelChange)="updateNoise('seed', $event)" />
        </mat-form-field>
        <button mat-stroked-button (click)="randomizeSeed()">Random</button>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-octaves">Octaves: {{ noise().octaves }}</label>
        <mat-slider min="1" max="10" step="1" discrete>
          <input
            id="slider-octaves"
            matSliderThumb
            [ngModel]="noise().octaves"
            (ngModelChange)="updateNoise('octaves', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-frequency">Frequency: {{ noise().frequency.toFixed(2) }}</label>
        <mat-slider min="0.1" max="5" step="0.1">
          <input
            id="slider-frequency"
            matSliderThumb
            [ngModel]="noise().frequency"
            (ngModelChange)="updateNoise('frequency', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-persistence">Persistence: {{ noise().persistence.toFixed(2) }}</label>
        <mat-slider min="0.1" max="1" step="0.05">
          <input
            id="slider-persistence"
            matSliderThumb
            [ngModel]="noise().persistence"
            (ngModelChange)="updateNoise('persistence', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-lacunarity">Lacunarity: {{ noise().lacunarity.toFixed(2) }}</label>
        <mat-slider min="1" max="4" step="0.1">
          <input
            id="slider-lacunarity"
            matSliderThumb
            [ngModel]="noise().lacunarity"
            (ngModelChange)="updateNoise('lacunarity', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-water">Water %: {{ (noise().waterPercentage * 100).toFixed(0) }}%</label>
        <mat-slider min="0.1" max="0.9" step="0.05">
          <input
            id="slider-water"
            matSliderThumb
            [ngModel]="noise().waterPercentage"
            (ngModelChange)="updateNoise('waterPercentage', $event)" />
        </mat-slider>
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>Climate Parameters</mat-panel-title>
      </mat-expansion-panel-header>

      <div class="param-controls__slider-row">
        <label for="slider-moisture">Initial Moisture: {{ climate().initialMoisture.toFixed(2) }}</label>
        <mat-slider min="0" max="1" step="0.05">
          <input
            id="slider-moisture"
            matSliderThumb
            [ngModel]="climate().initialMoisture"
            (ngModelChange)="updateClimate('initialMoisture', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-evaporation">Evaporation: {{ climate().evaporationFactor.toFixed(2) }}</label>
        <mat-slider min="0" max="1" step="0.05">
          <input
            id="slider-evaporation"
            matSliderThumb
            [ngModel]="climate().evaporationFactor"
            (ngModelChange)="updateClimate('evaporationFactor', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-precip">Precipitation: {{ climate().precipitationFactor.toFixed(2) }}</label>
        <mat-slider min="0" max="1" step="0.05">
          <input
            id="slider-precip"
            matSliderThumb
            [ngModel]="climate().precipitationFactor"
            (ngModelChange)="updateClimate('precipitationFactor', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-runoff">Runoff: {{ climate().runoffFactor.toFixed(2) }}</label>
        <mat-slider min="0" max="1" step="0.05">
          <input
            id="slider-runoff"
            matSliderThumb
            [ngModel]="climate().runoffFactor"
            (ngModelChange)="updateClimate('runoffFactor', $event)" />
        </mat-slider>
      </div>

      <div class="param-controls__slider-row">
        <label for="slider-cycles">Climate Cycles: {{ climate().climateCycles }}</label>
        <mat-slider min="1" max="20" step="1" discrete>
          <input
            id="slider-cycles"
            matSliderThumb
            [ngModel]="climate().climateCycles"
            (ngModelChange)="updateClimate('climateCycles', $event)" />
        </mat-slider>
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>Map Size</mat-panel-title>
      </mat-expansion-panel-header>

      <div class="param-controls__row">
        <mat-form-field appearance="outline" class="param-controls__field--small">
          <mat-label>Width</mat-label>
          <input matInput type="number" [ngModel]="mapWidth()" (ngModelChange)="mapWidth.set($event)" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="param-controls__field--small">
          <mat-label>Height</mat-label>
          <input matInput type="number" [ngModel]="mapHeight()" (ngModelChange)="mapHeight.set($event)" />
        </mat-form-field>
      </div>
    </mat-expansion-panel>
  </mat-accordion>

  <button mat-flat-button color="primary" class="param-controls__generate" (click)="onRegenerate()">Regenerate</button>
</div>
